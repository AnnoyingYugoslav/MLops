version: '3.8'

services:
  # --------------------------------------------------------
  # SERVICE 1: Local MLFlow Tracking Server
  # --------------------------------------------------------
  mlflow:
    build: .
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri sqlite:///app/mlruns/mlflow.db 
      --default-artifact-root /app/mlruns
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5000"

  # --------------------------------------------------------
  # SERVICE 2: Background Dev Container
  # --------------------------------------------------------
  trainer:
    build: .
    container_name: model_trainer
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    # This keeps the container alive in the background indefinitely
    command: tail -f /dev/null
    depends_on:
      - mlflow
    # ENABLE GPU SUPPORT (Remove the 'deploy' block if you are on a CPU-only machine)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]